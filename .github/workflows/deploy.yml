name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔴 "Inject API Keys" ステップは削除した（2026-07-17）。
      #    このステップこそが公開HTMLへ実キーを焼き込む露出源だった。GitHub Pages は
      #    静的配信＝ここで注入した値は view-source で誰でも読める。実測で Gemini の
      #    実キーが公開され、かつ有効なままだった。
      #    LLMを呼ぶ経路は Cloudflare Worker プロキシに置き、鍵はブラウザへ配らない。
      #    「プレースホルダー形式を維持する」ルールは鍵を隠さない＝再発防止にならない。
      #    ⚠️ ここへ鍵注入を復活させないこと。冗長化が要るなら Worker 側で行う。
      - name: Assert no API keys in published HTML
        run: python3 scripts/assert_no_secrets.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
